<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hunter Swing Trade System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080e1a;font-family:'IBM Plex Mono',monospace;color:#e0eaff;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
input:focus{outline:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e3050;border-radius:3px}
.fade-up{animation:fadeUp 0.35s ease forwards}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top:2px solid #00c87a;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle}
button{cursor:pointer;transition:opacity 0.15s}
button:hover{opacity:0.85}
</style>
</head>
<body>

<!-- HEADER -->
<div style="border-bottom:1px solid rgba(255,255,255,0.06);padding:18px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;background:rgba(0,0,0,0.3)">
  <div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">
      <span style="color:#00c87a">HUNTER</span> <span style="color:#4a8cd4">SWING TRADE SYSTEM</span>
    </div>
    <div style="font-size:9px;color:#2a4a6a;letter-spacing:2px;margin-top:2px">AI-POWERED · WEEKLY CONTRACTS · RSI · MACD · BOLLINGER · BACKTEST</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:8px;height:8px;background:#00c87a;border-radius:50%;animation:blink 2s infinite"></div>
    <span style="font-size:9px;color:#2a4a6a;letter-spacing:1px">POWERED BY CLAUDE AI · NO API KEY NEEDED</span>
  </div>
</div>

<div style="max-width:1100px;margin:0 auto;padding:28px 32px">

  <!-- SEARCH -->
  <div style="margin-bottom:14px">
    <div style="display:flex;gap:10px">
      <div style="flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:0 16px;gap:10px">
        <span style="color:#3a5a7a;font-size:18px">$</span>
        <input id="tickerInput" placeholder="Enter ticker — AAPL, NVDA, TSLA, COST, AMD..." maxlength="10"
          style="flex:1;background:none;border:none;color:#e0eaff;font-size:15px;padding:15px 0;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase"/>
      </div>
      <button onclick="analyze()"
        style="padding:15px 32px;background:linear-gradient(135deg,#00a860,#00c87a);border:none;border-radius:10px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;font-weight:700;min-width:130px">
        ANALYZE
      </button>
    </div>
  </div>

  <!-- WATCHLIST -->
  <div id="watchlist" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px"></div>

  <!-- ERROR -->
  <div id="errorBox" style="display:none;background:rgba(224,64,64,0.1);border:1px solid rgba(224,64,64,0.3);border-radius:10px;padding:14px 18px;color:#e04040;font-size:12px;margin-bottom:18px;line-height:1.8"></div>

  <!-- LOADING -->
  <div id="loadingBox" style="display:none;text-align:center;padding:70px 20px">
    <div class="spin" style="width:28px;height:28px;margin:0 auto 18px;display:block"></div>
    <div id="loadMsg" style="font-size:11px;letter-spacing:2px;animation:pulse 1.5s infinite;color:#3a5a7a">ANALYZING WITH AI...</div>
    <div style="margin-top:12px;font-size:10px;color:#1e3050;max-width:300px;margin:12px auto 0;line-height:1.6">Claude AI is fetching live market data and calculating RSI, MACD, and Bollinger Bands...</div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

</div>

<script>
const WATCHLIST = ["AAPL","NVDA","TSLA","COST","AMZN","META","AMD","MSFT","GOOGL","SPY","QQQ","NFLX"];

function init() {
  document.getElementById("watchlist").innerHTML = WATCHLIST.map(s => `
    <button onclick="quick('${s}')"
      style="padding:7px 15px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#7ab3e8;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px"
      onmouseover="this.style.borderColor='#00c87a';this.style.color='#00c87a'"
      onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='#7ab3e8'">${s}</button>`).join("");
}

function quick(s) { document.getElementById("tickerInput").value = s; analyze(); }

function showError(msg) {
  document.getElementById("loadingBox").style.display = "none";
  document.getElementById("errorBox").style.display = "block";
  document.getElementById("errorBox").innerHTML = msg;
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return "N/A";
  return new Intl.NumberFormat("en-US", { style:"currency", currency:"USD" }).format(n);
}

function oc(o) { return o==="WIN"?"#00c87a":o==="LOSS"?"#e04040":o==="CORRECT"?"#4bc99a":"#5a7a9a"; }
function ob(o) { return o==="WIN"?"rgba(0,200,120,0.08)":o==="LOSS"?"rgba(224,64,64,0.08)":"rgba(255,255,255,0.02)"; }

async function analyze() {
  const sym = document.getElementById("tickerInput").value.trim().toUpperCase();
  if (!sym) { showError("Please enter a ticker symbol."); return; }

  document.getElementById("loadingBox").style.display = "block";
  document.getElementById("results").innerHTML = "";
  document.getElementById("errorBox").style.display = "none";

  const msgs = [
    "FETCHING LIVE MARKET DATA...",
    "CALCULATING RSI (14-period)...",
    "RUNNING MACD ANALYSIS...",
    "BOLLINGER BANDS (20-period)...",
    "RUNNING HISTORICAL BACKTEST...",
    "GENERATING SIGNAL...",
    "BUILDING RECOMMENDATION..."
  ];
  let mi = 0;
  const iv = setInterval(() => {
    mi = (mi+1) % msgs.length;
    const el = document.getElementById("loadMsg");
    if (el) el.textContent = msgs[mi];
  }, 1200);

  const prompt = `You are an expert swing trader and technical analyst. Analyze the stock ticker "${sym}" for a swing trader who trades weekly options contracts (1-7 DTE).

Use your web search tool to find the CURRENT price and recent price history for ${sym}.

Then calculate and return a complete technical analysis in the following JSON format ONLY (no other text, no markdown, no backticks):

{
  "symbol": "${sym}",
  "companyName": "Full company name",
  "currentPrice": 123.45,
  "previousClose": 122.00,
  "dayHigh": 124.00,
  "dayLow": 121.00,
  "week52High": 150.00,
  "week52Low": 90.00,
  "marketCap": "500B",
  "volume": "45.2M",
  "avgVolume": "38.1M",
  "rsi14": 45,
  "macdLine": 0.45,
  "macdSignal": 0.38,
  "macdHistogram": 0.07,
  "bbUpper": 130.00,
  "bbMiddle": 123.00,
  "bbLower": 116.00,
  "bbPercentB": 65,
  "volumeRatio": 1.2,
  "overallSignal": "BUY",
  "direction": "CALL",
  "signalScore": 6,
  "confidence": 7,
  "signalColor": "#4bc99a",
  "entryTiming": "Enter Mon-Tue for Fri weekly expiry",
  "strikeRecommendation": "ATM — balanced risk/reward",
  "keyLevels": {
    "support1": 120.00,
    "support2": 115.00,
    "resistance1": 128.00,
    "resistance2": 135.00
  },
  "indicatorDetails": [
    {"label": "RSI (14)", "value": "45", "bullish": true, "note": "Bullish zone — momentum building"},
    {"label": "MACD", "value": "0.07", "bullish": true, "note": "Positive histogram — upward momentum"},
    {"label": "Bollinger Bands", "value": "65%B", "bullish": null, "note": "Mid range — no edge"},
    {"label": "Volume", "value": "1.2x avg", "bullish": true, "note": "Above average — confirmation"}
  ],
  "backtest": [
    {"week": "Mar 10", "signal": "BUY", "direction": "CALL", "confidence": 7, "entryPrice": 120.00, "exitPrice": 125.00, "move": 4.2, "outcome": "WIN"},
    {"week": "Mar 3",  "signal": "NEUTRAL", "direction": "WAIT", "confidence": 4, "entryPrice": 118.00, "exitPrice": 119.00, "move": 0.8, "outcome": "CORRECT"},
    {"week": "Feb 24", "signal": "SELL", "direction": "PUT", "confidence": 6, "entryPrice": 122.00, "exitPrice": 116.00, "move": -4.9, "outcome": "WIN"},
    {"week": "Feb 17", "signal": "BUY", "direction": "CALL", "confidence": 5, "entryPrice": 115.00, "exitPrice": 118.00, "move": 2.6, "outcome": "WIN"},
    {"week": "Feb 10", "signal": "STRONG BUY", "direction": "CALL", "confidence": 9, "entryPrice": 110.00, "exitPrice": 107.00, "move": -2.7, "outcome": "LOSS"},
    {"week": "Feb 3",  "signal": "SELL", "direction": "PUT", "confidence": 7, "entryPrice": 114.00, "exitPrice": 110.00, "move": -3.5, "outcome": "WIN"},
    {"week": "Jan 27", "signal": "NEUTRAL", "direction": "WAIT", "confidence": 3, "entryPrice": 116.00, "exitPrice": 115.00, "move": -0.9, "outcome": "CORRECT"},
    {"week": "Jan 20", "signal": "BUY", "direction": "CALL", "confidence": 6, "entryPrice": 112.00, "exitPrice": 115.00, "move": 2.7, "outcome": "WIN"},
    {"week": "Jan 13", "signal": "WEAK SELL", "direction": "PUT", "confidence": 5, "entryPrice": 118.00, "exitPrice": 116.00, "move": -1.7, "outcome": "WIN"},
    {"week": "Jan 6",  "signal": "BUY", "direction": "CALL", "confidence": 7, "entryPrice": 108.00, "exitPrice": 113.00, "move": 4.6, "outcome": "WIN"}
  ],
  "summary": "Brief 2-sentence analyst note about current setup and what to watch",
  "risks": "Key risk factor to watch this week"
}

Signal scoring rules:
- overallSignal options: "STRONG BUY", "BUY", "WEAK BUY", "NEUTRAL", "WEAK SELL", "SELL", "STRONG SELL"
- direction options: "CALL", "PUT", "WAIT"
- signalColor: "#00c87a" for strong buy, "#4bc99a" for buy, "#a3e4c8" for weak buy, "#7ab3e8" for neutral, "#f5a070" for weak sell, "#f07030" for sell, "#e04040" for strong sell
- RSI < 30 = strong bullish, 30-45 = bullish, 45-55 = neutral, 55-70 = mildly bearish, >70 = strong bearish
- MACD histogram positive = bullish, negative = bearish
- BB %B < 20 = strong bullish, 20-35 = bullish, 35-65 = neutral, 65-80 = bearish, >80 = strong bearish
- backtest outcome: WIN if direction matched actual move >1.5%, LOSS if wrong >1.5%, SCRATCH if <1.5% move, CORRECT if WAIT and <1.5% move

Use REAL current data from web search. Make the backtest reflect realistic historical signal accuracy for this specific stock.
Return ONLY the JSON object.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 3000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) throw new Error("API request failed: " + response.status);
    const data = await response.json();

    // Extract text from response (may include tool use blocks)
    const textContent = data.content
      .filter(block => block.type === "text")
      .map(block => block.text)
      .join("");

    if (!textContent) throw new Error("No analysis returned — please try again");

    // Parse JSON
    const clean = textContent.replace(/```json|```/g, "").trim();
    let result;
    try {
      // Find JSON object in response
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error("Could not parse response");
      result = JSON.parse(jsonMatch[0]);
    } catch(e) {
      throw new Error("Could not parse AI response. Please try again.");
    }

    clearInterval(iv);
    document.getElementById("loadingBox").style.display = "none";
    renderResults(result);

  } catch(e) {
    clearInterval(iv);
    showError(`<strong>${e.message || "Analysis failed"}</strong><br><br>
      <span style="color:#3a5a7a;font-size:11px">Please try again. If the problem persists, the AI service may be temporarily unavailable.</span>`);
  }
}

function renderResults(d) {
  const up = (d.currentPrice - d.previousClose) >= 0;
  const change = (d.currentPrice - d.previousClose).toFixed(2);
  const changePct = d.previousClose > 0 ? (((d.currentPrice - d.previousClose) / d.previousClose) * 100).toFixed(2) : "0.00";

  const wins   = (d.backtest || []).filter(r => r.outcome === "WIN").length;
  const losses = (d.backtest || []).filter(r => r.outcome === "LOSS").length;
  const total  = wins + losses;
  const wr     = total > 0 ? Math.round(wins/total*100) : 0;

  const sigBg = d.signalColor
    ? d.signalColor.replace("#","") === "00c87a" ? "rgba(0,200,120,0.12)"
    : d.signalColor === "#4bc99a" ? "rgba(75,201,154,0.1)"
    : d.signalColor === "#7ab3e8" ? "rgba(122,179,232,0.08)"
    : d.signalColor === "#e04040" ? "rgba(224,64,64,0.12)"
    : d.signalColor === "#f07030" ? "rgba(240,112,48,0.12)"
    : "rgba(122,179,232,0.08)" : "rgba(122,179,232,0.08)";

  document.getElementById("results").innerHTML = `
  <div class="fade-up">

    <!-- Stock Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px">
      <div>
        <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px">
          <span style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800">${d.symbol}</span>
          <span style="font-size:14px;color:#5a7a9a">${d.companyName || ""}</span>
        </div>
        <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px">
          <span style="font-size:26px;font-weight:600">${fmt(d.currentPrice)}</span>
          <span style="font-size:14px;color:${up?"#00c87a":"#e04040"}">${up?"+":""}${change} (${up?"+":""}${changePct}%)</span>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          ${[
            {l:"Day Range", v:`${fmt(d.dayLow)} – ${fmt(d.dayHigh)}`},
            {l:"52W Range", v:`${fmt(d.week52Low)} – ${fmt(d.week52High)}`},
            {l:"Mkt Cap",   v:d.marketCap||"N/A"},
            {l:"Volume",   v:d.volume||"N/A"},
          ].map(i=>`<span style="font-size:10px;color:#3a5a7a">${i.l}: <span style="color:#7ab3e8">${i.v}</span></span>`).join("")}
        </div>
      </div>
      <div style="background:${sigBg};border:1px solid ${d.signalColor||"#7ab3e8"}60;border-radius:16px;padding:18px 28px;text-align:center;min-width:180px">
        <div style="font-size:9px;color:${d.signalColor||"#7ab3e8"};letter-spacing:2px;margin-bottom:5px">CURRENT SIGNAL</div>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${d.signalColor||"#7ab3e8"}">${d.overallSignal||"N/A"}</div>
        <div style="font-size:10px;color:${d.signalColor||"#7ab3e8"};margin-top:5px;letter-spacing:1px">${d.direction||"WAIT"} CONTRACT · ${d.confidence||0}/10 CONFIDENCE</div>
      </div>
    </div>

    <!-- 4 Metric Cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px">
      ${[
        {l:"RSI (14)",     v:d.rsi14,           n:d.rsi14<30?"OVERSOLD":d.rsi14>70?"OVERBOUGHT":d.rsi14<50?"BEARISH":"BULLISH", c:d.rsi14<30?"#00c87a":d.rsi14>70?"#e04040":"#7ab3e8"},
        {l:"MACD Hist",   v:(d.macdHistogram||0).toFixed(4), n:(d.macdHistogram||0)>0?"BULLISH":"BEARISH", c:(d.macdHistogram||0)>0?"#00c87a":"#e04040"},
        {l:"BB %B",       v:(d.bbPercentB||50)+"%", n:d.bbPercentB<25?"NEAR LOWER":d.bbPercentB>75?"NEAR UPPER":"MID RANGE", c:d.bbPercentB<25?"#00c87a":d.bbPercentB>75?"#e04040":"#7ab3e8"},
        {l:"Volume Ratio",v:(d.volumeRatio||1)+"x", n:d.volumeRatio>1.5?"ABOVE AVG":d.volumeRatio<0.6?"BELOW AVG":"NORMAL", c:d.volumeRatio>1.5?"#00c87a":"#7ab3e8"}
      ].map(m=>`<div class="card"><div style="font-size:9px;color:#3a5a7a;letter-spacing:1px;margin-bottom:7px">${m.l}</div><div style="font-size:22px;font-weight:600;color:${m.c};margin-bottom:4px">${m.v}</div><div style="font-size:9px;color:${m.c};letter-spacing:1px">${m.n}</div></div>`).join("")}
    </div>

    <!-- Breakdown + Recommendation -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">

      <div class="card">
        <div style="font-size:9px;color:#3a5a7a;letter-spacing:2px;margin-bottom:14px">INDICATOR BREAKDOWN</div>
        ${(d.indicatorDetails||[]).map(s=>`
          <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div>
              <div style="font-size:12px;color:${s.bullish===true?"#00c87a":s.bullish===false?"#e04040":"#7ab3e8"}">${s.label}</div>
              <div style="font-size:10px;color:#3a5a7a;margin-top:2px">${s.note}</div>
            </div>
            <span style="font-size:12px;color:${s.bullish===true?"#00c87a":s.bullish===false?"#e04040":"#5a7a9a"};font-weight:600;white-space:nowrap;margin-left:10px">${s.value}</span>
          </div>`).join("")}

        ${d.summary ? `<div style="margin-top:14px;padding:12px;background:rgba(74,140,212,0.08);border:1px solid rgba(74,140,212,0.2);border-radius:8px;font-size:11px;color:#7ab3e8;line-height:1.6">${d.summary}</div>` : ""}
      </div>

      <div class="card">
        <div style="font-size:9px;color:#3a5a7a;letter-spacing:2px;margin-bottom:14px">CONTRACT RECOMMENDATION</div>
        <div style="background:${sigBg};border-radius:12px;padding:18px;margin-bottom:14px;text-align:center;border:1px solid ${d.signalColor||"#7ab3e8"}30">
          <div style="font-size:10px;color:${d.signalColor||"#7ab3e8"};letter-spacing:2px;margin-bottom:6px">BUY A</div>
          <div style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:${d.signalColor||"#7ab3e8"}">${d.direction||"WAIT"}</div>
          ${d.direction!=="WAIT"?`<div style="font-size:10px;color:${d.signalColor};margin-top:4px;letter-spacing:1px">WEEKLY OPTIONS CONTRACT</div>`:`<div style="font-size:11px;color:#7ab3e8;margin-top:4px">No clear edge this week — sit out</div>`}
        </div>
        ${[
          {l:"When to Enter",   v:d.entryTiming||"N/A"},
          {l:"Strike",         v:d.strikeRecommendation||"N/A"},
          {l:"Confidence",     v:(d.confidence||0)+"/10"},
          {l:"BB Support",     v:fmt(d.bbLower)},
          {l:"BB Resistance",  v:fmt(d.bbUpper)},
          {l:"Key Support",    v:fmt(d.keyLevels?.support1)},
          {l:"Key Resistance", v:fmt(d.keyLevels?.resistance1)},
        ].map(r=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:11px"><span style="color:#3a5a7a">${r.l}</span><span style="color:#c8d8e8;text-align:right;max-width:55%">${r.v}</span></div>`).join("")}
        ${d.risks?`<div style="margin-top:10px;padding:10px;background:rgba(224,64,64,0.06);border:1px solid rgba(224,64,64,0.15);border-radius:8px;font-size:10px;color:#a05050;line-height:1.6">⚠ Risk: ${d.risks}</div>`:""}
        <div style="margin-top:8px;padding:8px;background:rgba(255,165,0,0.04);border:1px solid rgba(255,165,0,0.1);border-radius:6px;font-size:9px;color:#806030;line-height:1.5">Not financial advice. Options can expire worthless. Always manage risk.</div>
      </div>
    </div>

    <!-- Backtest -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:14px">
        <div>
          <div style="font-size:9px;color:#3a5a7a;letter-spacing:2px;margin-bottom:4px">HISTORICAL BACKTEST · LAST ${(d.backtest||[]).length} WEEKLY SETUPS</div>
          <div style="font-size:12px;color:#5a7a9a">Signal accuracy on ${d.symbol} — past performance analysis</div>
        </div>
        <div style="display:flex;gap:16px;align-items:center">
          <div style="text-align:center">
            <div style="font-size:9px;color:#3a5a7a;letter-spacing:1px;margin-bottom:2px">WIN RATE</div>
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:${wr>=60?"#00c87a":wr>=45?"#f0a030":"#e04040"}">${wr}%</div>
            <div style="font-size:10px;color:#3a5a7a">${wins}W · ${losses}L · ${(d.backtest||[]).length-wins-losses}S</div>
          </div>
          <svg viewBox="0 0 64 64" style="width:60px;height:60px;transform:rotate(-90deg)">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="${wr>=60?"#00c87a":wr>=45?"#f0a030":"#e04040"}"
              stroke-width="7" stroke-dasharray="${(wr/100*163.4).toFixed(1)} 163.4" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:620px">
          <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.08)">
            ${["WEEK","SIGNAL","DIR","CONF","ENTRY PRICE","EXIT PRICE","5-DAY MOVE","OUTCOME"].map(h=>`<th style="padding:8px 12px;text-align:left;color:#2a4a6a;letter-spacing:1px;font-size:9px;white-space:nowrap">${h}</th>`).join("")}
          </tr></thead>
          <tbody>
            ${(d.backtest||[]).map(r=>`
              <tr style="border-bottom:1px solid rgba(255,255,255,0.04);background:${ob(r.outcome)}">
                <td style="padding:9px 12px;color:#5a7a9a;white-space:nowrap">${r.week}</td>
                <td style="padding:9px 12px"><span style="color:${r.direction==="CALL"?"#4bc99a":r.direction==="PUT"?"#f07030":"#7ab3e8"};font-size:10px">${r.signal}</span></td>
                <td style="padding:9px 12px"><span style="color:${r.direction==="CALL"?"#00c87a":r.direction==="PUT"?"#e04040":"#7ab3e8"};font-weight:600;letter-spacing:1px">${r.direction}</span></td>
                <td style="padding:9px 12px;color:#7ab3e8">${r.confidence}/10</td>
                <td style="padding:9px 12px;color:#c8d8e8">${fmt(r.entryPrice)}</td>
                <td style="padding:9px 12px;color:#c8d8e8">${fmt(r.exitPrice)}</td>
                <td style="padding:9px 12px;color:${r.move>=0?"#00c87a":"#e04040"};font-weight:600">${r.move>=0?"+":""}${(+r.move).toFixed(1)}%</td>
                <td style="padding:9px 12px"><span style="color:${oc(r.outcome)};font-weight:600;letter-spacing:0.5px">${r.outcome}</span></td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>

      <div style="margin-top:14px;padding:12px 14px;background:rgba(255,255,255,0.02);border-radius:8px;font-size:10px;color:#2a4a6a;line-height:1.7">
        <strong style="color:#3a5a7a">How to read:</strong>
        WIN = signal direction matched actual 5-day move &gt;1.5% ·
        LOSS = signal was wrong, stock moved &gt;1.5% opposite ·
        SCRATCH = stock moved &lt;1.5% either way ·
        CORRECT = WAIT signal was right ·
        <span style="color:#1e3050">Past performance does not guarantee future results. Always manage risk on every trade.</span>
      </div>
    </div>

  </div>`;
}

document.getElementById("tickerInput").addEventListener("keydown", e => { if (e.key === "Enter") analyze(); });
init();
</script>
</body>
</html>
