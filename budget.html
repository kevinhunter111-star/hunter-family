function calcARTax(income) {
  if (income <= 0) return 0;
  const brackets = [
    { limit: 9000, rate: 0.02 },
    { limit: 17900, rate: 0.04 },
    { limit: Infinity, rate: 0.059 },
  ];
  let tax = 0, prev = 0;
  for (const b of brackets) {
    if (income <= prev) break;
    tax += (Math.min(income, b.limit) - prev) * b.rate;
    prev = b.limit;
  }
  return tax;
}

function cleanVendorName(fromRaw, fromEmail, subject) {
  const fromLower = fromRaw.toLowerCase();
  const emailLower = fromEmail.toLowerCase();
  const subjectLower = subject.toLowerCase();
  for (const [key, cleanName] of Object.entries(VENDOR_MAP)) {
    if (fromLower.includes(key) || emailLower.includes(key) || subjectLower.includes(key)) return cleanName;
  }
  return fromRaw.split("<")[0].trim().replace(/['"]/g, "").trim() || fromEmail.split("@")[1]?.split(".")[0] || "Unknown Vendor";
}

let gmailAccessToken = null;

function loadGapiScript() {
  return new Promise((res) => {
    if (window.google && window.google.accounts) { res(); return; }
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = res;
    document.head.appendChild(s);
  });
}

async function signInGmail() {
  await loadGapiScript();
  return new Promise((res, rej) => {
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GMAIL_CLIENT_ID, scope: GMAIL_SCOPES,
      callback: (resp) => {
        if (resp.error) { rej(resp.error); return; }
        gmailAccessToken = resp.access_token;
        try { localStorage.setItem("gmailToken", resp.access_token); } catch {}
        res(resp.access_token);
      },
    });
    client.requestAccessToken();
  });
}

function signOutGmail() {
  if (gmailAccessToken && window.google) window.google.accounts.oauth2.revoke(gmailAccessToken);
  gmailAccessToken = null;
  try { localStorage.removeItem("gmailToken"); } catch {}
}

async function fetchGmailBills(token) {
  const query = encodeURIComponent("newer_than:90d (bill OR statement OR invoice OR payment due OR amount due OR your bill OR autopay OR new statement)");
  const listRes = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=100&q=" + query, { headers: { Authorization: "Bearer " + token } });
  if (!listRes.ok) throw new Error("Gmail list failed: " + listRes.status);
  const listData = await listRes.json();
  const messages = listData.messages || [];
  const bills = [];
  for (const msg of messages.slice(0, 50)) {
    try {
      const msgRes = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/" + msg.id + "?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date", { headers: { Authorization: "Bearer " + token } });
      if (!msgRes.ok) continue;
      const msgData = await msgRes.json();
      const headers = msgData.payload?.headers || [];
      const from = (headers.find(h => h.name === "From")?.value || "").toLowerCase();
      const subject = (headers.find(h => h.name === "Subject")?.value || "");
      const date = headers.find(h => h.name === "Date")?.value || "";
      const isBill = BILL_SENDERS.some(s => from.includes(s) || subject.toLowerCase().includes(s)) || /\$[\d,]+\.?\d*/.test(subject) || /(bill|statement|invoice|amount due|payment due|due date)/i.test(subject);
      if (!isBill) continue;
      const snippet = msgData.snippet || "";
      const amountText = subject + " " + snippet;
      const amountPatterns = [/\$([\d,]+\.\d{2})/,/\$([\d,]+)/,/amount(?:\s+due)?[:\s]+\$?([\d,]+\.?\d*)/i,/total[:\s]+\$?([\d,]+\.?\d*)/i,/payment[:\s]+\$?([\d,]+\.?\d*)/i,/due[:\s]+\$?([\d,]+\.?\d*)/i,/balance[:\s]+\$?([\d,]+\.?\d*)/i];
      let amount = null;
      for (const pattern of amountPatterns) { const m = amountText.match(pattern); if (m) { amount = parseFloat(m[1].replace(/,/g, "")); break; } }
      const fromName = headers.find(h => h.name === "From")?.value || "";
      const vendor = cleanVendorName(fromName, from, subject);
      const combined = from + " " + subject + " " + (msgData.snippet || "");
      const isTX = /(centerpoint|oncor|txu|reliant|atmos energy|coserv|pedernales|texas|tx\b)/i.test(combined);
      const isAR = /(entergy arkansas|entergy ar|arkansas|\bAR\b|the pointe|bentonville|fayetteville|rogers|springdale|ozark)/i.test(combined);
      const state = isTX ? "TX" : isAR ? "AR" : "SHARED";
      const catText = from + " " + subject + " " + (msgData.snippet || "");
      const cat = /(netflix|hulu|spotify|amazon prime|disney|hbo|peacock|paramount|youtube premium|apple tv|subscription|streaming)/i.test(catText) ? "subscriptions"
        : /(electric|gas|water|energy|utility|power|oncor|entergy|centerpoint|txu|reliant|atmos)/i.test(catText) ? "utilities"
        : /(mortgage|home loan|mr.cooper|mr cooper|pennymac|loancare|rocket mortgage|nationstar|flagstar)/i.test(catText) ? "mortgage"
        : /(hoa|homeowner.{0,10}association|community management|property management|the pointe|pointe at)/i.test(catText) ? "hoa"
        : /(insurance|progressive|statefarm|state farm|allstate|geico|usaa|liberty mutual|farmers|nationwide)/i.test(catText) ? "insurance"
        : /(att|at&t|verizon|tmobile|t-mobile|xfinity|comcast|spectrum|cox|phone|internet|wireless)/i.test(catText) ? "utilities"
        : "other";
      bills.push({ id: msg.id, gmailId: msg.id, vendor, amount, dueDate: null, state, category: cat, confidence: amount ? "high" : "medium", notes: subject, fileName: "Gmail: " + subject.slice(0, 50), source: "gmail", rawDate: date });
    } catch(e) { continue; }
  }
  return bills;
}

async function loadSharedData(token) {
  const preloaded = getPreloadedPhotos();
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    const saved = ls ? JSON.parse(ls) : null;
    if (saved) return { ...saved, txPhoto: saved.txPhoto || preloaded.txPhoto, arPhoto: saved.arPhoto || preloaded.arPhoto };

  return { ...DEFAULT_DATA, ...preloaded };
}

function SVGDonutChart({ data }) {
  const [tooltip, setTooltip] = useState(null);
  const size = 260, cx = 130, cy = 130, R = 100, r = 58;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return <div style={{height:260,display:"flex",alignItems:"center",justifyContent:"center",color:"#3a5a7a",fontFamily:"'DM Mono', monospace",fontSize:12}}>No data yet</div>;
  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const a = (d.value / total) * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + a), y2 = cy + R * Math.sin(angle + a);
    const xi1 = cx + r * Math.cos(angle), yi1 = cy + r * Math.sin(angle);
    const xi2 = cx + r * Math.cos(angle + a), yi2 = cy + r * Math.sin(angle + a);
    const large = a > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${R},${R},0,${large},1,${x2},${y2} L${xi2},${yi2} A${r},${r},0,${large},0,${xi1},${yi1} Z`;
    const fill = d.group==="tx" ? COLORS_TX[i%5] : d.group==="ar" ? COLORS_AR[i%5] : COLORS_SHARED[i%10];
    angle += a;
    return { path, fill, name: d.name, value: d.value };
  });
  return (
    <div style={{ position:"relative" }}>
      <svg width={size} height={size} style={{ display:"block", margin:"0 auto" }}>
        {slices.map((s, i) => (
          <path key={i} d={s.path} fill={s.fill} stroke="#0f2040" strokeWidth={2} style={{ cursor:"pointer" }}
            onMouseEnter={e => setTooltip({ name:s.name, value:s.value, x:e.clientX, y:e.clientY })}
            onMouseLeave={() => setTooltip(null)} />
        ))}
        <text x={cx} y={cy-8} textAnchor="middle" fill="#c8d8e8" fontSize={13} fontFamily="'DM Mono', monospace">TOTAL</text>
        <text x={cx} y={cy+12} textAnchor="middle" fill="#4bc99a" fontSize={16} fontWeight="bold" fontFamily="'DM Mono', monospace">${Math.round(total).toLocaleString()}</text>
      </svg>
      {tooltip && <div style={{ position:"fixed", left:tooltip.x+12, top:tooltip.y-10, background:"#0f2040", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"8px 12px", fontSize:12, fontFamily:"'DM Mono', monospace", color:"#e8f2ff", pointerEvents:"none", zIndex:999, whiteSpace:"nowrap" }}>
        <div style={{color:"#7ab3e8",marginBottom:2}}>{tooltip.name}</div>
        <div style={{color:"#4bc99a",fontWeight:700}}>${Math.round(tooltip.value).toLocaleString()}</div>
      </div>}
    </div>
  );
}

function SVGBarChart({ data }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 420, H = 240, padL = 48, padB = 36, padT = 16, padR = 16;
  const barColors = ["#2d9e72","#c44b00","#2b5fb0","#f07030","#4bc99a"];
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const bw = (W - padL - padR) / data.length;
  const barW = bw * 0.55;
  const yTicks = 4;
  return (
    <div style={{ position:"relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H+padB}`} style={{ display:"block" }}>
        {Array.from({length:yTicks+1},(_,i)=>{
          const y = padT + (H-padT) * (1 - i/yTicks);
          const val = (maxVal * i/yTicks);
          return <g key={i}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke="rgba(255,255,255,0.07)" strokeWidth={1} /><text x={padL-6} y={y+4} textAnchor="end" fill="#5a7a9a" fontSize={9} fontFamily="'DM Mono', monospace">${val>=1000?(val/1000).toFixed(0)+"k":Math.round(val)}</text></g>;
        })}
        {data.map((d, i) => {
          const x = padL + i*bw + (bw-barW)/2;
          const bh = Math.max(2, ((d.value/maxVal) * (H-padT)));
          const y = padT + (H-padT) - bh;
          return <g key={i}><rect x={x} y={y} width={barW} height={bh} fill={barColors[i%barColors.length]} rx={4} style={{ cursor:"pointer" }} onMouseEnter={e => setTooltip({ name:d.name, value:d.value, x:e.clientX, y:e.clientY })} onMouseLeave={() => setTooltip(null)} /><text x={x+barW/2} y={H+padT+2} textAnchor="middle" fill="#7ab3e8" fontSize={10} fontFamily="'DM Mono', monospace">{d.name}</text></g>;
        })}
      </svg>
      {tooltip && <div style={{ position:"fixed", left:tooltip.x+12, top:tooltip.y-10, background:"#0f2040", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"8px 12px", fontSize:12, fontFamily:"'DM Mono', monospace", color:"#e8f2ff", pointerEvents:"none", zIndex:999 }}>
        <div style={{color:"#7ab3e8",marginBottom:2}}>{tooltip.name}</div>
        <div style={{color:"#4bc99a",fontWeight:700}}>${Math.round(tooltip.value).toLocaleString()}</div>
      </div>}
    </div>
  );
}

  useEffect(() => {

      const withMeta = { ...data, lastUpdatedBy: user?.email || "family", lastUpdatedAt: new Date().toISOString() };
      await saveSharedData(withMeta, token);

      setTimeout(() => setSyncStatus("idle"), 2500);

  }, [data, loaded]);

  const isAnnual = data.period === "annual";
  const mult = isAnnual ? 12 : 1;
  const arAllocated = data.grossIncome * (data.arIncomeAllocation / 100);
  const arTaxAnnual = calcARTax(arAllocated);
  const ficaAnnual = data.grossIncome * 0.0765;
  const totalTaxAnn = arTaxAnnual + ficaAnnual;
  const netMonthly = (data.grossIncome - totalTaxAnn) / 12;
  const txTotal = Object.values(data.txExpenses).reduce((a,b) => a + Number(b), 0);
  const arTotal = Object.values(data.arExpenses).reduce((a,b) => a + Number(b), 0);
  const sharedTotal = Object.values(data.sharedExpenses).reduce((a,b) => a + Number(b), 0);
  const totalExp = txTotal + arTotal + sharedTotal;
  const surplus = netMonthly - totalExp;
  const healthColor = surplus > 500 ? "#2d9e72" : surplus > 0 ? "#f0a030" : "#e04040";
  const healthPct = Math.min(100, Math.max(0, (surplus / netMonthly) * 100));

  const update = (section, key, val) => setData(prev => ({ ...prev, [section]: { ...prev[section], [key]: Number(val) || 0 } }));

  const toBase64 = file => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });

  const parseBill = async (file) => {
    const base64 = await toBase64(file);
    const prompt = `You are a bill parser for a household with homes in both Texas and Arkansas. Analyze this PDF bill carefully.
Return ONLY a valid JSON object — no markdown, no explanation:
{"vendor":"company name","amount":123.45,"dueDate":"MM/DD/YYYY or null","billingPeriod":"e.g. June 2025 or null","serviceAddress":"full address if visible or null","state":"TX or AR or SHARED","category":"mortgage|utilities|hoa|insurance|maintenance|groceries|dining|transportation|healthcare|entertainment|clothing|subscriptions|childcare|savings|other","confidence":"high|medium|low","notes":"one sentence about what this bill is"}`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 800, messages: [{ role: "user", content: [{ type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } }, { type:"text", text:prompt }] }] })
    });
    const json = await res.json();
    const text = json.content?.map(c => c.text||"").join("") || "";
    return { ...JSON.parse(text.replace(/```json|```/g,"").trim()), fileName:file.name, id: Date.now()+Math.random() };
  };

  const handleFiles = async (files) => {
    const pdfs = Array.from(files).filter(f => f.type==="application/pdf" || f.name.endsWith(".pdf"));
    if (!pdfs.length) { setParseError("Please upload PDF files only."); return; }
    setParseError(""); setParsing(true);
    setParseQueue(pdfs.map(f => ({ name:f.name, status:"parsing" })));
    const results = [];
    for (let i=0; i<pdfs.length; i++) {
      try {
        const bill = await parseBill(pdfs[i]);
        results.push({ ...bill, status:"pending" });
        setParseQueue(q => q.map((item,idx) => idx===i ? { ...item, status:"done" } : item));
      } catch(e) { setParseQueue(q => q.map((item,idx) => idx===i ? { ...item, status:"error" } : item)); }

    if (results.length) { setPendingBills(prev => [...prev, ...results]); setActiveTab("import"); }
  };

// ── Auth ─────────────────────────────────────────────────────────────────────
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function mountApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  if (!window.__budgetMounted) {
    window.__budgetMounted = true;
    ReactDOM.render(React.createElement(AuthWrapper), document.getElementById("app"));
  }
}

window.checkBudgetPassword = async function() {
  const pw = document.getElementById("budget-pw").value;
  if (!pw) return;
  const hash = await hashPw(pw);
  const stored = localStorage.getItem("hunter_pw_hash");
  const defaultHash = await hashPw("hunter2025");
  const valid = stored || defaultHash;
  if (hash === valid) {
    if (!stored) localStorage.setItem("hunter_pw_hash", defaultHash);
    sessionStorage.setItem("hunter_budget_auth", "1");
    mountApp();
  } else {
    document.getElementById("budget-pw-error").style.display = "block";
    document.getElementById("budget-pw").value = "";
    setTimeout(() => document.getElementById("budget-pw-error").style.display = "none", 3000);
  }
};

document.addEventListener("DOMContentLoaded", () => {
  const pwInput = document.getElementById("budget-pw");
  if (pwInput) pwInput.addEventListener("keydown", e => { if (e.key === "Enter") window.checkBudgetPassword(); });
  const inIframe = window.self !== window.top;
  const alreadyAuthed = sessionStorage.getItem("hunter_budget_auth") === "1";
  if (inIframe || alreadyAuthed) {
    sessionStorage.setItem("hunter_budget_auth", "1");
    mountApp();
  }
});

function AuthWrapper() {
  const [authed] = React.useState(true);
  const user = { email: "family@hunter.com" };
  const handleLogout = () => {
    sessionStorage.removeItem("hunter_budget_auth");
    window.__budgetMounted = false;
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    document.getElementById("budget-pw").value = "";
  };
  if (!authed) return null;
  return <App user={user} onLogout={handleLogout} />;
}
