// ── Arkansas 2024 tax brackets ──────────────────────────────────────────────
function calcARTax(income) {
  if (income <= 0) return 0;
  const brackets = [
    { limit: 9000, rate: 0.02 },
    { limit: 17900, rate: 0.04 },
    { limit: Infinity, rate: 0.059 },
  ];
  let tax = 0, prev = 0;
  for (const b of brackets) {
    if (income <= prev) break;
    tax += (Math.min(income, b.limit) - prev) * b.rate;
    prev = b.limit;
  }
  return tax;
}

function cleanVendorName(fromRaw, fromEmail, subject) {
  const fromLower = fromRaw.toLowerCase();
  const emailLower = fromEmail.toLowerCase();
  const subjectLower = subject.toLowerCase();
  // Check vendor map against from name, email domain, and subject
  for (const [key, cleanName] of Object.entries(VENDOR_MAP)) {
    if (fromLower.includes(key) || emailLower.includes(key) || subjectLower.includes(key)) {
      return cleanName;
    }
  }
  // Fall back to cleaned from name
  return fromRaw.split("<")[0].trim().replace(/['"]/g, "").trim() || fromEmail.split("@")[1]?.split(".")[0] || "Unknown Vendor";
}

    });
    client.requestAccessToken();
  });
}

}

async function fetchGmailBills(token) {
  // Search Gmail for bill-related emails from last 60 days
  const query = encodeURIComponent("newer_than:90d (bill OR statement OR invoice OR payment due OR amount due OR your bill OR autopay OR new statement)");
  const listRes = await fetch(
    "https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=100&q=" + query,
    { headers: { Authorization: "Bearer " + token } }
  );
  if (!listRes.ok) throw new Error("Gmail list failed: " + listRes.status);
  const listData = await listRes.json();
  const messages = listData.messages || [];

  const bills = [];
  for (const msg of messages.slice(0, 50)) {
    try {
      const msgRes = await fetch(
        "https://gmail.googleapis.com/gmail/v1/users/me/messages/" + msg.id + "?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date",
        { headers: { Authorization: "Bearer " + token } }
      );
      if (!msgRes.ok) continue;
      const msgData = await msgRes.json();
      const headers = msgData.payload?.headers || [];
      const from    = (headers.find(h => h.name === "From")?.value || "").toLowerCase();
      const subject = (headers.find(h => h.name === "Subject")?.value || "");
      const date    = headers.find(h => h.name === "Date")?.value || "";

      // Only process emails that look like bills
      const isBill = BILL_SENDERS.some(s => from.includes(s) || subject.toLowerCase().includes(s))
        || /\$[\d,]+\.?\d*/.test(subject)
        || /(bill|statement|invoice|amount due|payment due|due date)/i.test(subject);

      if (!isBill) continue;

      // Extract amount from subject
      // Try subject first for amount, then fall back to snippet
      const snippet = msgData.snippet || "";
      const amountText = subject + " " + snippet;
      // Match common amount formats: $123.45, $1,234.56, "amount due: 123.45"
      const amountPatterns = [
        /\$([\d,]+\.\d{2})/,           // $123.45
        /\$([\d,]+)/,                    // $123
        /amount(?:\s+due)?[:\s]+\$?([\d,]+\.?\d*)/i,  // amount due: 123.45
        /total[:\s]+\$?([\d,]+\.?\d*)/i,              // total: 123.45
        /payment[:\s]+\$?([\d,]+\.?\d*)/i,            // payment: 123.45
        /due[:\s]+\$?([\d,]+\.?\d*)/i,               // due: 123.45
        /balance[:\s]+\$?([\d,]+\.?\d*)/i,           // balance: 123.45
      ];
      let amount = null;
      for (const pattern of amountPatterns) {
        const m = amountText.match(pattern);
        if (m) { amount = parseFloat(m[1].replace(/,/g, "")); break; }
      }

      // Detect vendor from sender — use clean name map
      const fromName = headers.find(h => h.name === "From")?.value || "";
      const vendor = cleanVendorName(fromName, from, subject);

      // Detect state from known TX/AR utilities
      const combined = from + " " + subject + " " + (msgData.snippet || "");
      const isTX = /(centerpoint|oncor|txu|reliant|atmos energy|coserv|pedernales|texas|tx\b)/i.test(combined);
      const isAR = /(entergy arkansas|entergy ar|arkansas|\bAR\b|the pointe|bentonville|fayetteville|rogers|springdale|ozark)/i.test(combined);
      const state = isTX ? "TX" : isAR ? "AR" : "SHARED";

      // Detect category
      const catText = from + " " + subject + " " + (msgData.snippet || "");
      const cat = /(netflix|hulu|spotify|amazon prime|disney|hbo|peacock|paramount|youtube premium|apple tv|subscription|streaming)/i.test(catText) ? "subscriptions"
        : /(electric|gas|water|energy|utility|power|oncor|entergy|centerpoint|txu|reliant|atmos)/i.test(catText) ? "utilities"
        : /(mortgage|home loan|mr.cooper|mr cooper|pennymac|loancare|rocket mortgage|nationstar|flagstar)/i.test(catText) ? "mortgage"
        : /(hoa|homeowner.{0,10}association|community management|property management|the pointe|pointe at)/i.test(catText) ? "hoa"
        : /(insurance|progressive|statefarm|state farm|allstate|geico|usaa|liberty mutual|farmers|nationwide)/i.test(catText) ? "insurance"
        : /(att|at&t|verizon|tmobile|t-mobile|xfinity|comcast|spectrum|cox|phone|internet|wireless)/i.test(catText) ? "utilities"
        : /(credit card|statement|minimum payment|account ending)/i.test(catText) ? "other"
        : "other";

      // Skip if already imported
      if (importedIds.current.has(msg.id)) continue;

      const isHighConfidence = amount !== null && vendor !== "Unknown Vendor"
        && (VENDOR_MAP[vendor.toLowerCase()] !== undefined
            || Object.keys(VENDOR_MAP).some(k => (from+subject).toLowerCase().includes(k)));

      bills.push({
        id: msg.id,
        gmailId: msg.id,
        vendor: vendor,
        amount: amount,
        dueDate: null,
        state: state,
        category: cat,
        confidence: isHighConfidence ? "high" : amount !== null ? "medium" : "low",
        notes: subject,
        fileName: "Gmail: " + subject.slice(0, 50),
        confidence: amount ? "high" : "medium",
        source: "gmail",
        rawDate: date,
      });
    } catch(e) { continue; }
  }
  return bills;
}

    return {

// ── Netlify Blobs Sync ───────────────────────────────────────────────────────
async function loadSharedData(token) {
  const preloaded = getPreloadedPhotos();
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    const saved = ls ? JSON.parse(ls) : null;
    if (saved) return { ...saved, txPhoto: saved.txPhoto || preloaded.txPhoto, arPhoto: saved.arPhoto || preloaded.arPhoto };
  } catch {}
  return { ...DEFAULT_DATA, ...preloaded };
}

async function saveSharedData(data, token) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

        {photo ? (

          </>
        )}
      </div>
    </div>
  );
}

// ── Native SVG Donut Chart ───────────────────────────────────────────────────
function SVGDonutChart({ data }) {
  const [tooltip, setTooltip] = useState(null);
  const size = 260, cx = 130, cy = 130, R = 100, r = 58;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (total === 0) return <div style={{height:260,display:"flex",alignItems:"center",justifyContent:"center",color:"#3a5a7a",fontFamily:"'DM Mono', monospace",fontSize:12}}>No data yet</div>;
  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const a = (d.value / total) * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + a), y2 = cy + R * Math.sin(angle + a);
    const xi1 = cx + r * Math.cos(angle), yi1 = cy + r * Math.sin(angle);
    const xi2 = cx + r * Math.cos(angle + a), yi2 = cy + r * Math.sin(angle + a);
    const large = a > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${R},${R},0,${large},1,${x2},${y2} L${xi2},${yi2} A${r},${r},0,${large},0,${xi1},${yi1} Z`;
    const fill = d.group==="tx" ? COLORS_TX[i%5] : d.group==="ar" ? COLORS_AR[i%5] : COLORS_SHARED[i%10];
    const midA = angle + a/2;
    const tx = cx + (R+r)/2 * Math.cos(midA), ty = cy + (R+r)/2 * Math.sin(midA);
    angle += a;
    return { path, fill, name: d.name, value: d.value, tx, ty };
  });
  return (
    <div style={{ position:"relative" }}>
      <svg width={size} height={size} style={{ display:"block", margin:"0 auto" }}>
        {slices.map((s, i) => (
          <path key={i} d={s.path} fill={s.fill} stroke="#0f2040" strokeWidth={2}
            style={{ cursor:"pointer", transition:"opacity 0.15s" }}
            onMouseEnter={e => setTooltip({ name:s.name, value:s.value, x:e.clientX, y:e.clientY })}
            onMouseLeave={() => setTooltip(null)}
          />
        ))}
        <text x={cx} y={cy-8} textAnchor="middle" fill="#c8d8e8" fontSize={13} fontFamily="'DM Mono', monospace">TOTAL</text>
        <text x={cx} y={cy+12} textAnchor="middle" fill="#4bc99a" fontSize={16} fontWeight="bold" fontFamily="'DM Mono', monospace">${Math.round(total).toLocaleString()}</text>
      </svg>
      {tooltip && (
        <div style={{ position:"fixed", left:tooltip.x+12, top:tooltip.y-10, background:"#0f2040", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"8px 12px", fontSize:12, fontFamily:"'DM Mono', monospace", color:"#e8f2ff", pointerEvents:"none", zIndex:999, whiteSpace:"nowrap" }}>
          <div style={{color:"#7ab3e8",marginBottom:2}}>{tooltip.name}</div>
          <div style={{color:"#4bc99a",fontWeight:700}}>${Math.round(tooltip.value).toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

// ── Native SVG Bar Chart ─────────────────────────────────────────────────────
function SVGBarChart({ data }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 420, H = 240, padL = 48, padB = 36, padT = 16, padR = 16;
  const barColors = ["#2d9e72","#c44b00","#2b5fb0","#f07030","#4bc99a"];
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const bw = (W - padL - padR) / data.length;
  const barW = bw * 0.55;
  const yTicks = 4;
  return (
    <div style={{ position:"relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H+padB}`} style={{ display:"block" }}>
        {/* Y grid lines */}
        {Array.from({length:yTicks+1},(_,i)=>{
          const y = padT + (H-padT) * (1 - i/yTicks);
          const val = (maxVal * i/yTicks);
          return (
            <g key={i}>
              <line x1={padL} x2={W-padR} y1={y} y2={y} stroke="rgba(255,255,255,0.07)" strokeWidth={1} />
              <text x={padL-6} y={y+4} textAnchor="end" fill="#5a7a9a" fontSize={9} fontFamily="'DM Mono', monospace">${val>=1000?(val/1000).toFixed(0)+"k":Math.round(val)}</text>
            </g>
          );
        })}
        {/* Bars */}
        {data.map((d, i) => {
          const x = padL + i*bw + (bw-barW)/2;
          const bh = Math.max(2, ((d.value/maxVal) * (H-padT)));
          const y = padT + (H-padT) - bh;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={bh} fill={barColors[i%barColors.length]} rx={4}
                style={{ cursor:"pointer" }}
                onMouseEnter={e => setTooltip({ name:d.name, value:d.value, x:e.clientX, y:e.clientY })}
                onMouseLeave={() => setTooltip(null)} />
              <text x={x+barW/2} y={H+padT+2} textAnchor="middle" fill="#7ab3e8" fontSize={10} fontFamily="'DM Mono', monospace">{d.name}</text>
            </g>
          );
        })}
      </svg>
      {tooltip && (
        <div style={{ position:"fixed", left:tooltip.x+12, top:tooltip.y-10, background:"#0f2040", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"8px 12px", fontSize:12, fontFamily:"'DM Mono', monospace", color:"#e8f2ff", pointerEvents:"none", zIndex:999 }}>
          <div style={{color:"#7ab3e8",marginBottom:2}}>{tooltip.name}</div>
          <div style={{color:"#4bc99a",fontWeight:700}}>${Math.round(tooltip.value).toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App({ user, onLogout }) {
  const [data, setData]           = useState(DEFAULT_DATA);
  const [loaded, setLoaded]       = useState(false);
  const [activeTab, setActiveTab] = useState("overview");
  const [dragOver, setDragOver]   = useState(false);
  const [parsing, setParsing]     = useState(false);
  const [parseQueue, setParseQueue] = useState([]);
  const [pendingBills, setPendingBills] = useState(() => {
    try {
      const saved = localStorage.getItem("pendingBills");
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });

  // Track which Gmail message IDs have already been imported (no duplicates)
  const importedIds = useRef(new Set((() => {
    try {
      const saved = localStorage.getItem("importedGmailIds");
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  })()));

  const markImported = (id) => {
    importedIds.current.add(id);
    try { localStorage.setItem("importedGmailIds", JSON.stringify([...importedIds.current])); } catch {}
  };
  const [parseError, setParseError]     = useState("");
  const [syncStatus, setSyncStatus]     = useState("idle"); // idle | saving | saved | error
  const [refreshing, setRefreshing]     = useState(false);
  const [gmailConnected, setGmailConnected] = useState(false);
  const [gmailScanning, setGmailScanning]   = useState(false);
  const [gmailEmail, setGmailEmail]         = useState("");
  const [showUserMenu, setShowUserMenu] = useState(false);
  const fileRef = useRef();
  const saveTimer = useRef();

  const token = user?.token?.access_token || "";

  // Load data on mount
  useEffect(() => {
    loadSharedData(token).then(d => {
      if (d) setData(prev => ({ ...DEFAULT_DATA, ...d }));
      setLoaded(true);
    });
  }, []);

  // Save pending bills to localStorage whenever they change
  useEffect(() => {
    try { localStorage.setItem("pendingBills", JSON.stringify(pendingBills)); } catch {}
  }, [pendingBills]);

  // Auto-save on data change (debounced)
  useEffect(() => {
    if (!loaded) return;
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const withMeta = { ...data, lastUpdatedBy: user?.email || "family", lastUpdatedAt: new Date().toISOString() };
      await saveSharedData(withMeta, token);
      setSyncStatus("saved");
      setTimeout(() => setSyncStatus("idle"), 2500);
    }, 900);
  }, [data, loaded]);

  // Manual refresh — see refresh button in header

  // Derived values
  const isAnnual    = data.period === "annual";
  const mult        = isAnnual ? 12 : 1;
  const arAllocated = data.grossIncome * (data.arIncomeAllocation / 100);
  const arTaxAnnual = calcARTax(arAllocated);
  const ficaAnnual  = data.grossIncome * 0.0765;
  const totalTaxAnn = arTaxAnnual + ficaAnnual;
  const netMonthly  = (data.grossIncome - totalTaxAnn) / 12;
  const txTotal     = Object.values(data.txExpenses).reduce((a,b) => a + Number(b), 0);
  const arTotal     = Object.values(data.arExpenses).reduce((a,b) => a + Number(b), 0);
  const sharedTotal = Object.values(data.sharedExpenses).reduce((a,b) => a + Number(b), 0);
  const totalExp    = txTotal + arTotal + sharedTotal;
  const surplus     = netMonthly - totalExp;
  const healthColor = surplus > 500 ? "#2d9e72" : surplus > 0 ? "#f0a030" : "#e04040";
  const healthPct   = Math.min(100, Math.max(0, (surplus / netMonthly) * 100));

  const update = (section, key, val) =>
    setData(prev => ({ ...prev, [section]: { ...prev[section], [key]: Number(val) || 0 } }));

  // PDF → base64
  const toBase64 = file => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  // Parse bill with Claude AI
  const parseBill = async (file) => {
    const base64 = await toBase64(file);
    const prompt = `You are a bill parser for a household with homes in both Texas and Arkansas. Analyze this PDF bill carefully.
Return ONLY a valid JSON object — no markdown, no explanation:
{
  "vendor": "company name",
  "amount": 123.45,
  "dueDate": "MM/DD/YYYY or null",
  "billingPeriod": "e.g. June 2025 or null",
  "serviceAddress": "full address if visible or null",
  "state": "TX or AR or SHARED",
  "category": "mortgage|utilities|hoa|insurance|maintenance|groceries|dining|transportation|healthcare|entertainment|clothing|subscriptions|childcare|savings|other",
  "confidence": "high|medium|low",
  "notes": "one sentence about what this bill is"
}
State rules: TX address/zip → TX. AR address/zip → AR. National/no address → SHARED.
Category rules: mortgage/rent→mortgage, electric/gas/water/internet/phone→utilities, HOA→hoa, home/auto/life insurance→insurance, repair/upkeep→maintenance, grocery stores→groceries, restaurants→dining, car/fuel/auto→transportation, medical/dental/pharmacy→healthcare, streaming/software→subscriptions, kids care→childcare.`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        messages: [{
          role: "user",
          content: [
            { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } },
            { type:"text", text:prompt }
          ]
        }]
      })
    });
    const json = await res.json();
    const text = json.content?.map(c => c.text||"").join("") || "";
    const clean = text.replace(/```json|```/g,"").trim();
    return { ...JSON.parse(clean), fileName:file.name, id: Date.now()+Math.random() };
  };

  const handleFiles = async (files) => {
    const pdfs = Array.from(files).filter(f => f.type==="application/pdf" || f.name.endsWith(".pdf"));
    if (!pdfs.length) { setParseError("Please upload PDF files only."); return; }
    setParseError("");
    setParsing(true);
    setParseQueue(pdfs.map(f => ({ name:f.name, status:"parsing" })));
    const results = [];
    for (let i=0; i<pdfs.length; i++) {
      try {
        const bill = await parseBill(pdfs[i]);
        results.push({ ...bill, status:"pending" });
        setParseQueue(q => q.map((item,idx) => idx===i ? { ...item, status:"done" } : item));
      } catch(e) {
        setParseQueue(q => q.map((item,idx) => idx===i ? { ...item, status:"error" } : item));
      }
    }
    setParsing(false);
    if (results.length) { setPendingBills(prev => [...prev, ...results]); setActiveTab("import"); }
  };

  const confirmBill = (bill, edits) => {
    const final = { ...bill, ...edits, confirmedAt: new Date().toISOString(), confirmedBy: user?.email || "family" };
    setData(prev => {
      const sec = edits.state==="TX" ? "txExpenses" : edits.state==="AR" ? "arExpenses" : "sharedExpenses";
      const cat = edits.category in prev[sec] ? edits.category : "other";
      return { ...prev, [sec]: { ...prev[sec], [cat]: Number(edits.amount)||prev[sec][cat] }, billHistory:[final,...(prev.billHistory||[])].slice(0,200) };
    });
    setPendingBills(prev => prev.filter(b => b.id!==bill.id));
  };

  const dismissBill = id => setPendingBills(prev => prev.filter(b => b.id!==id));

  // Chart data
  const pieData = [
    ...Object.entries(data.txExpenses).filter(([,v])=>v>0).map(([k,v])=>({name:`TX: ${CATEGORY_LABELS[k]}`,value:v*mult,group:"tx"})),
    ...Object.entries(data.arExpenses).filter(([,v])=>v>0).map(([k,v])=>({name:`AR: ${CATEGORY_LABELS[k]}`,value:v*mult,group:"ar"})),
    ...Object.entries(data.sharedExpenses).filter(([,v])=>v>0).map(([k,v])=>({name:CATEGORY_LABELS[k],value:v*mult,group:"shared"})),
  ];
  const barData = [
    { name:"TX Home", value:txTotal*mult },
    { name:"AR Home", value:arTotal*mult },
    { name:"Shared",  value:sharedTotal*mult },
    { name:"Taxes",   value:(totalTaxAnn/12)*mult },
    { name:"Surplus", value:Math.max(0,surplus)*mult },
  ];

  // Photo handlers
  const handleTxPhoto = (dataUrl) => setData(d => ({ ...d, txPhoto: dataUrl }));
  const handleArPhoto = (dataUrl) => setData(d => ({ ...d, arPhoto: dataUrl }));
  const handleTxLabel = (val) => setData(d => ({ ...d, txPhotoLabel: val }));
  const handleArLabel = (val) => setData(d => ({ ...d, arPhotoLabel: val }));

  // Refresh — pull latest from Netlify Blobs
  const handleRefresh = async () => {
    setRefreshing(true);
    try {
      const fresh = await loadSharedData(token);
      if (fresh) setData(fresh);
    } catch(e) {}
    setRefreshing(false);
  };

  // Gmail connect & scan
  const handleGmailConnect = async () => {
    try {
      const gToken = await signInGmail();
      // Get user email
      const profileRes = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/profile", {
        headers: { Authorization: "Bearer " + gToken }
      });
      const profile = await profileRes.json();
      setGmailEmail(profile.emailAddress || "Gmail");
      setGmailConnected(true);
      handleGmailScan(gToken);
    } catch(e) {
      console.error("Gmail connect failed:", e);
      alert("Gmail connection failed. Make sure popups are allowed and try again.");
    }
  };

  const handleGmailScan = async (gToken) => {
    const tokenToUse = gToken || gmailAccessToken;
    if (!tokenToUse) return;
    setGmailScanning(true);
    setActiveTab("import");
    try {
      const bills = await fetchGmailBills(tokenToUse);
      if (bills.length > 0) {
        setPendingBills(prev => {
          const existingIds = new Set(prev.map(b => b.notes));
          const newBills = bills.filter(b => !existingIds.has(b.notes));
          return [...prev, ...newBills];

        alert("No bill emails found in the last 60 days. Try uploading PDFs instead.");
      }

      console.error("Gmail scan failed:", e);
      alert("Gmail scan failed: " + e.message);
    }
    setGmailScanning(false);
  };

  const handleGmailDisconnect = () => {
    signOutGmail();
    setGmailConnected(false);
    setGmailEmail("");

    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>

// ── Auth wrapper (simple password, no Netlify needed) ────────────────────────
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

window.checkBudgetPassword = async function() {
  const pw = document.getElementById("budget-pw").value;
  if (!pw) return;
  const hash = await hashPw(pw);
  const stored = localStorage.getItem("hunter_pw_hash");
  const defaultHash = await hashPw("hunter2025");
  const valid = stored || defaultHash;
  if (hash === valid) {
    if (!stored) localStorage.setItem("hunter_pw_hash", defaultHash);
    sessionStorage.setItem("hunter_budget_auth","1");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
        // Auth handled by checkBudgetPassword and DOMContentLoaded above
  } else { ReactDOM.render(React.createElement(AuthWrapper), document.getElementById("app"));
    document.getElementById("budget-pw-error").style.display = "block";
    document.getElementById("budget-pw").value = "";
    setTimeout(()=>document.getElementById("budget-pw-error").style.display="none", 3000);
  }
};

document.addEventListener("DOMContentLoaded", () => {
  const pwInput = document.getElementById("budget-pw");
  if (pwInput) pwInput.addEventListener("keydown", e => { if(e.key==="Enter") window.checkBudgetPassword(); });
  
  // Auto-login if: already authenticated this session OR loaded inside an iframe (hub handles auth)
  const inIframe = window.self !== window.top;
  const alreadyAuthed = sessionStorage.getItem("hunter_budget_auth") === "1";
  
  if (inIframe || alreadyAuthed) {
    sessionStorage.setItem("hunter_budget_auth", "1");
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    ReactDOM.render(React.createElement(AuthWrapper), document.getElementById("app"));
  }
});

function AuthWrapper() {
  const [authed] = React.useState(true);
  const user = { email: "family@hunter.com" };

  const handleLogout = () => {
    sessionStorage.removeItem("hunter_budget_auth");
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    document.getElementById("budget-pw").value = "";
  };

  if (!authed) return null;
  return <App user={user} onLogout={handleLogout} />;
}

// Auth handled by checkBudgetPassword and DOMContentLoaded above
